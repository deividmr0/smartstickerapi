<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Tracker — Trazabilidad</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ── THEME TOKENS ── */
  [data-theme="dark"] {
    --bg: #0a0c10;
    --surface: #111418;
    --surface2: #181c22;
    --border: #222830;
    --accent: #00e5a0;
    --accent2: #0088ff;
    --warn: #ff6b35;
    --text: #e8edf5;
    --text2: #c0c8d8;
    --muted: #5a6478;
    --shadow: rgba(0,0,0,0.5);
  }

  [data-theme="light"] {
    --bg: #f0f2f6;
    --surface: #ffffff;
    --surface2: #f5f7fb;
    --border: #dde1ea;
    --accent: #007a55;
    --accent2: #1a6fd4;
    --warn: #d95a1e;
    --text: #1a1f2e;
    --text2: #3d4558;
    --muted: #8a92a8;
    --shadow: rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.25s, color 0.25s;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    z-index: 1000;
    box-shadow: 0 1px 8px var(--shadow);
    transition: background 0.25s, border-color 0.25s;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.5px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .logo svg { width: 20px; height: 20px; }

  .v-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

  .status-chip {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    white-space: nowrap;
    transition: all 0.2s;
  }
  .status-chip.loading {
    color: var(--accent2);
    background: color-mix(in srgb, var(--accent2) 12%, transparent);
    border-color: color-mix(in srgb, var(--accent2) 30%, transparent);
    animation: pulse 1.2s infinite;
  }
  .status-chip.error {
    color: var(--warn);
    background: color-mix(in srgb, var(--warn) 12%, transparent);
    border-color: color-mix(in srgb, var(--warn) 30%, transparent);
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  .ml-auto { margin-left: auto; }

  .theme-toggle {
    width: 34px; height: 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 20px;
    height: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    transition: background 0.25s;
  }

  .tb-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .tb-select, .tb-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s, background 0.25s;
    cursor: pointer;
  }
  .tb-select:focus, .tb-input:focus { border-color: var(--accent); }
  .tb-select { min-width: 210px; }
  .tb-input  { width: 162px; }
  .tb-select option { background: var(--surface); color: var(--text); }
  .tb-device-wrap { display: flex; align-items: center; gap: 6px; }
  .tb-device-search { width: 240px; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 7px 14px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #000; }
  [data-theme="light"] .btn-primary { color: #fff; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    transition: background 0.25s;
  }
  .stat-value { font-size: 19px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .device-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 8px;
  }
  .device-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .device-name { font-size: 11px; font-weight: 600; color: var(--text); }
  .device-imei { font-size: 9px; color: var(--muted); margin-top: 1px; }

  .time-range {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .time-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
  .time-row:last-child { margin-bottom: 0; }
  .time-key { color: var(--muted); }
  .time-val { color: var(--text); }

  .list-header {
    padding: 10px 16px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .points-list { flex: 1; overflow-y: auto; }
  .points-list::-webkit-scrollbar { width: 3px; }
  .points-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .point-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    border-left: 2px solid transparent;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.12s;
  }
  .point-item:hover { background: var(--surface2); }
  .point-item.active { background: color-mix(in srgb, var(--accent) 8%, transparent); border-left-color: var(--accent); }
  .point-item.p-start { border-left-color: var(--accent); }
  .point-item.p-end   { border-left-color: var(--warn); }

  .pt-idx { font-size: 9px; font-weight: 700; color: var(--muted); min-width: 26px; padding-top: 1px; }
  .pt-body { flex: 1; min-width: 0; }
  .pt-time { font-size: 11px; color: var(--text); margin-bottom: 3px; }
  .pt-coords { font-size: 9px; color: var(--muted); margin-bottom: 4px; }
  .pt-tags { display: flex; gap: 4px; flex-wrap: wrap; }

  .tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .tag-off   { background: color-mix(in srgb, #cc2222 10%, transparent); color: #cc2222; border: 1px solid color-mix(in srgb, #cc2222 25%, transparent); }
  [data-theme="dark"] .tag-off { color: #ff6666; }
  .tag-on    { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent); }
  .tag-speed { background: color-mix(in srgb, var(--accent2) 10%, transparent); color: var(--accent2); border: 1px solid color-mix(in srgb, var(--accent2) 25%, transparent); }
  .tag-sat   { background: color-mix(in srgb, #8844cc 10%, transparent); color: #8844cc; border: 1px solid color-mix(in srgb, #8844cc 25%, transparent); }
  [data-theme="dark"] .tag-sat { color: #cc88ff; }

  /* ── MAP ── */
  #map { flex: 1; }

  [data-theme="dark"]  .leaflet-tile { filter: brightness(0.9) saturate(0.85); }
  [data-theme="light"] .leaflet-tile { filter: brightness(1) saturate(1); }

  /* popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 28px var(--shadow) !important;
    color: var(--text) !important;
    font-family: 'JetBrains Mono', monospace !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-content { font-size: 11px; line-height: 1.75; margin: 12px 16px !important; }
  .popup-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--accent); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .popup-row { display:flex; justify-content:space-between; gap:16px; }
  .popup-key { color:var(--muted); }
  .popup-val { color:var(--text); font-weight:600; }

  /* ── EMPTY / LOADER ── */
  .empty-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:24px; }
  .empty-icon { font-size:30px; }
  .empty-text { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--muted); text-align:center; }
  .empty-sub  { font-size:10px; color:var(--muted); opacity:0.6; text-align:center; line-height:1.6; }
  .spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:20px; right:20px;
    background:var(--warn); color:#fff;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    padding:10px 16px; border-radius:6px; max-width:340px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:9999;
    animation:slideUp 0.3s ease; transition:opacity 0.3s;
  }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/>
    </svg>
      SEWAY GEOTRACKER
  </div>
  <div class="v-divider"></div>
  <span class="status-chip" id="statusChip">INICIANDO</span>
  <div class="ml-auto">
    <div class="theme-toggle" id="themeBtn" title="Cambiar tema" onclick="toggleTheme()">🌙</div>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <span class="tb-label">Dispositivo</span>
  <div class="tb-device-wrap">
    <input type="search" class="tb-input tb-device-search" id="deviceSearch" placeholder="Buscar dispositivo o IMEI">
    <select class="tb-select" id="deviceSelect">
      <option value="">Cargando…</option>
    </select>
  </div>
  <div class="v-divider"></div>
  <span class="tb-label">Desde</span>
  <input type="datetime-local" class="tb-input" id="beginTime" value="2026-03-28T00:00">
  <span class="tb-label">Hasta</span>
  <input type="datetime-local" class="tb-input" id="endTime"   value="2026-03-31T23:59">
  <button class="btn btn-primary" id="fetchBtn" onclick="fetchLocations()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    CARGAR
  </button>
  <button class="btn btn-ghost" onclick="clearAll()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    LIMPIAR
  </button>
</div>

<!-- Main -->
<div class="main">
  <div class="sidebar">
    <!-- Stats -->
    <div class="sidebar-section">
      <div class="sidebar-label">Resumen</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalPoints">—</div><div class="stat-label">Puntos</div></div>
        <div class="stat-card"><div class="stat-value" id="distKm">—</div><div class="stat-label">Km aprox</div></div>
        <div class="stat-card"><div class="stat-value" id="durationH">—</div><div class="stat-label">Duración</div></div>
        <div class="stat-card"><div class="stat-value" id="maxSpeed">—</div><div class="stat-label">Vel. máx</div></div>
      </div>
    </div>

    <!-- Device info -->
    <div class="sidebar-section" id="deviceSection" style="display:none">
      <div class="sidebar-label">Dispositivo activo</div>
      <div class="device-bar">
        <div class="device-dot"></div>
        <div>
          <div class="device-name" id="devName">—</div>
          <div class="device-imei" id="devImei">—</div>
        </div>
      </div>
      <div class="time-range" id="timeRange"></div>
    </div>

    <!-- List -->
    <div class="list-header">Puntos GPS — <span id="pointsCount">0</span></div>
    <div class="points-list" id="pointsList">
      <div class="empty-wrap">
        <div class="empty-icon">🛰️</div>
        <div class="empty-text">Sin datos</div>
        <div class="empty-sub">Selecciona dispositivo y<br>rango de fechas, luego CARGAR</div>
      </div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script>
// ─────────────────────────────
//  CONFIG
// ─────────────────────────────
const API_BASE  = 'http://127.0.0.1:3000/v1';
const API_TOKEN = 'e630197bbed4025dd9d91ad9f6f6c1743d49e70528013815e3c9957f2506e42d';
const HEADERS   = { 'Authorization': `Bearer ${API_TOKEN}`, 'Accept': 'application/json' };

// ─────────────────────────────
//  THEME
// ─────────────────────────────
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  swapTiles();
}

// ─────────────────────────────
//  MAP
// ─────────────────────────────
let tileLayer = null;
const map = L.map('map', { center: [6.2, -75.6], zoom: 13 });

function swapTiles() {
  if (tileLayer) map.removeLayer(tileLayer);
  const url = isDark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  tileLayer = L.tileLayer(url, { attribution: '© OpenStreetMap © CARTO', maxZoom: 19 }).addTo(map);
}
swapTiles();

// ─────────────────────────────
//  STATE
// ─────────────────────────────
let allData  = [];
let devices  = [];
let polyline = null;
let markers  = [];

function getDeviceImei(d) {
  return d.imei || d.deviceId || d.id || '';
}

function getDeviceName(d) {
  const imei = getDeviceImei(d);
  return d.name || d.deviceName || d.alias || imei;
}

function renderDeviceOptions(filterText = '') {
  const sel = document.getElementById('deviceSelect');
  const prevValue = sel.value;
  const term = String(filterText || '').trim().toLowerCase();

  const filtered = devices.filter(d => {
    if (!term) return true;
    const imei = getDeviceImei(d);
    const name = getDeviceName(d);
    return `${name} ${imei}`.toLowerCase().includes(term);
  });

  if (!filtered.length) {
    sel.innerHTML = '<option value="">— Sin coincidencias —</option>';
    return;
  }

  sel.innerHTML = '<option value="">— Seleccionar dispositivo —</option>' +
    filtered.map(d => {
      const imei = getDeviceImei(d);
      const name = getDeviceName(d);
      return `<option value="${imei}">${name}${name !== imei ? ' · ' + imei : ''}</option>`;
    }).join('');

  if (prevValue && filtered.some(d => getDeviceImei(d) === prevValue)) {
    sel.value = prevValue;
  }
}

// ─────────────────────────────
//  ICONS
// ─────────────────────────────
function makeIcon(color, label) {
  return L.divIcon({
    className: '',
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -18],
    html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};
      border:2px solid rgba(255,255,255,0.28);display:flex;align-items:center;justify-content:center;
      font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#000;
      box-shadow:0 2px 12px rgba(0,0,0,0.45);cursor:pointer;">${label}</div>`
  });
}

// ─────────────────────────────
//  LOAD DEVICES
// ─────────────────────────────
async function loadDevices() {
  setStatus('CARGANDO...', 'loading');
  try {
    const res = await fetch(`${API_BASE}/devices?zone=us`, { headers: HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    devices = Array.isArray(json) ? json : (json.data || []);

    const sel = document.getElementById('deviceSelect');
    const search = document.getElementById('deviceSearch');
    if (!devices.length) {
      search.value = '';
      sel.innerHTML = '<option value="">— Sin dispositivos —</option>';
      setStatus('SIN DISPOSITIVOS', 'error'); return;
    }

    search.value = '';
    renderDeviceOptions('');

    setStatus(`${devices.length} DISPOSITIVO${devices.length>1?'S':''}`, '');
  } catch(e) {
    document.getElementById('deviceSearch').value = '';
    document.getElementById('deviceSelect').innerHTML = '<option value="">— Error al cargar —</option>';
    setStatus('ERROR', 'error');
    showToast('No se pudo cargar la lista de dispositivos: ' + e.message);
  }
}

// ─────────────────────────────
//  FETCH LOCATIONS
// ─────────────────────────────
async function fetchLocations() {
  const imei  = document.getElementById('deviceSelect').value;
  if (!imei) { showToast('Selecciona un dispositivo primero.'); return; }

  const begin = document.getElementById('beginTime').value.replace('T', ' ') + ':00';
  const end   = document.getElementById('endTime').value.replace('T', ' ')   + ':59';
  const url   = `${API_BASE}/devices/${imei}/locations?zone=us&beginTime=${encodeURIComponent(begin)}&endTime=${encodeURIComponent(end)}`;

  setStatus('CARGANDO...', 'loading');
  document.getElementById('fetchBtn').disabled = true;
  showListState('loading');

  try {
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    const json = await res.json();
    const raw  = Array.isArray(json) ? json : (json.data || []);

    if (!raw.length) {
      setStatus('SIN RESULTADOS', '');
      showListState('empty', 'Sin registros', 'No hay posiciones en el rango seleccionado');
      clearMapLayers(); resetStats(); return;
    }

    processData(raw, imei);
  } catch(e) {
    setStatus('ERROR', 'error');
    showListState('error', 'Error de conexión', e.message);
    showToast('Error al obtener ubicaciones: ' + e.message);
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

// ─────────────────────────────
//  PROCESS & RENDER
// ─────────────────────────────
function processData(raw, imei) {
  allData = raw.filter(p => p.latitude != null && p.longitude != null);
  allData.sort((a,b) => new Date(a.gpsTime) - new Date(b.gpsTime));
  clearMapLayers();
  renderStats(imei);
  renderSidebar();
  renderMap();
  setStatus(`${allData.length} PUNTOS`, '');
}

function clearAll() {
  clearMapLayers(); allData = []; resetStats();
  showListState('idle');
  document.getElementById('deviceSection').style.display = 'none';
  setStatus('LISTO', '');
}

function clearMapLayers() {
  markers.forEach(m => map.removeLayer(m)); markers = [];
  if (polyline) { map.removeLayer(polyline); polyline = null; }
}

function resetStats() {
  ['totalPoints','distKm','durationH','maxSpeed'].forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('pointsCount').textContent = '0';
}

// ─────────────────────────────
//  STATS
// ─────────────────────────────
function renderStats(imei) {
  document.getElementById('totalPoints').textContent = allData.length;
  document.getElementById('pointsCount').textContent = allData.length;

  let dist = 0;
  for (let i = 1; i < allData.length; i++)
    dist += haversine(allData[i-1].latitude, allData[i-1].longitude, allData[i].latitude, allData[i].longitude);
  document.getElementById('distKm').textContent = dist < 1 ? Math.round(dist*1000)+'m' : dist.toFixed(2);

  const t0 = new Date(allData[0].gpsTime), t1 = new Date(allData[allData.length-1].gpsTime);
  const mins = Math.round((t1-t0)/60000);
  document.getElementById('durationH').textContent = mins < 60 ? mins+'m' : (mins/60).toFixed(1)+'h';

  const speeds = allData.map(p=>p.speed).filter(s=>s!=null&&s>=0);
  document.getElementById('maxSpeed').textContent = speeds.length ? Math.max(...speeds)+' km/h' : '—';

  const dev = devices.find(d => getDeviceImei(d) == imei);
  document.getElementById('devName').textContent = dev ? getDeviceName(dev) : imei;
  document.getElementById('devImei').textContent = 'IMEI: '+imei;
  document.getElementById('timeRange').innerHTML = `
    <div class="time-row"><span class="time-key">Inicio</span><span class="time-val">${formatTime(allData[0].gpsTime)}</span></div>
    <div class="time-row"><span class="time-key">Fin</span><span class="time-val">${formatTime(allData[allData.length-1].gpsTime)}</span></div>`;
  document.getElementById('deviceSection').style.display = 'block';
}

// ─────────────────────────────
//  SIDEBAR LIST
// ─────────────────────────────
function renderSidebar() {
  document.getElementById('pointsList').innerHTML = allData.map((p,i) => {
    const ign = p.ignition === 'ON';
    const cls = i===0 ? 'p-start' : i===allData.length-1 ? 'p-end' : '';
    const spd = (p.speed!=null && p.speed>=0) ? `<span class="tag tag-speed">${p.speed}km/h</span>` : '';
    return `<div class="point-item ${cls}" data-index="${i}" onclick="focusPoint(${i})">
      <div class="pt-idx">#${String(i+1).padStart(3,'0')}</div>
      <div class="pt-body">
        <div class="pt-time">${formatTime(p.gpsTime)}</div>
        <div class="pt-coords">${(+p.latitude).toFixed(6)}, ${(+p.longitude).toFixed(6)}</div>
        <div class="pt-tags">
          <span class="tag ${ign?'tag-on':'tag-off'}">IGN:${p.ignition||'?'}</span>
          ${spd}
          <span class="tag tag-sat">SAT:${p.satellite||0}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────
//  MAP
// ─────────────────────────────
function renderMap() {
  const accent = isDark ? '#00e5a0' : '#007a55';
  const warn   = isDark ? '#ff6b35' : '#d95a1e';
  const mid    = isDark ? '#00e5a0' : '#1a6fd4';

  polyline = L.polyline(allData.map(p=>[p.latitude,p.longitude]), {
    color: accent, weight: 2.5, opacity: 0.75
  }).addTo(map);

  allData.forEach((p,i) => {
    const col   = i===0 ? accent : i===allData.length-1 ? warn : mid;
    const label = i===0 ? 'S' : i===allData.length-1 ? 'E' : '●';
    const m = L.marker([p.latitude,p.longitude], { icon: makeIcon(col,label) })
      .addTo(map).bindPopup(buildPopup(p,i));
    m.on('click', ()=>highlightSidebar(i));
    markers.push(m);
  });

  map.fitBounds(polyline.getBounds(), { padding:[40,40] });
}

function buildPopup(p,i) {
  const lbl = i===0 ? '🟢 INICIO' : i===allData.length-1 ? '🟠 FIN' : `Punto #${i+1}`;
  return `<div class="popup-title">${lbl}</div>
    <div class="popup-row"><span class="popup-key">Hora</span><span class="popup-val">${formatTime(p.gpsTime)}</span></div>
    <div class="popup-row"><span class="popup-key">Lat</span><span class="popup-val">${(+p.latitude).toFixed(6)}</span></div>
    <div class="popup-row"><span class="popup-key">Lng</span><span class="popup-val">${(+p.longitude).toFixed(6)}</span></div>
    <div class="popup-row"><span class="popup-key">Ignición</span><span class="popup-val">${p.ignition||'—'}</span></div>
    <div class="popup-row"><span class="popup-key">Velocidad</span><span class="popup-val">${p.speed>=0?p.speed+' km/h':'—'}</span></div>
    <div class="popup-row"><span class="popup-key">Satélites</span><span class="popup-val">${p.satellite||0}</span></div>
    <div class="popup-row"><span class="popup-key">Tipo pos.</span><span class="popup-val">${p.positionType||'—'}</span></div>`;
}

// ─────────────────────────────
//  FOCUS
// ─────────────────────────────
function focusPoint(i) {
  highlightSidebar(i);
  map.setView([allData[i].latitude, allData[i].longitude], 17, { animate: true });
  markers[i].openPopup();
}

function highlightSidebar(i) {
  document.querySelectorAll('.point-item').forEach(el=>el.classList.remove('active'));
  const el = document.querySelector(`.point-item[data-index="${i}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block:'nearest', behavior:'smooth' }); }
}

// ─────────────────────────────
//  HELPERS
// ─────────────────────────────
function setStatus(text, type) {
  const c = document.getElementById('statusChip');
  c.textContent = text;
  c.className = 'status-chip' + (type ? ' '+type : '');
}

function showListState(type, title, sub) {
  const icons = { loading:'', error:'⚠️', empty:'📭', idle:'🛰️' };
  const titles = { loading:'Consultando API…', error: title||'Error', empty: title||'Sin registros', idle:'Sin datos' };
  const subs   = { loading:'', error: sub||'', empty: sub||'', idle:'Selecciona dispositivo y fechas, luego CARGAR' };
  const spinner = type==='loading' ? '<div class="spinner"></div>' : `<div class="empty-icon">${icons[type]}</div>`;
  document.getElementById('pointsList').innerHTML = `
    <div class="empty-wrap">${spinner}
      <div class="empty-text">${titles[type]}</div>
      ${subs[type] ? `<div class="empty-sub">${subs[type]}</div>` : ''}
    </div>`;
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),350); }, 4500);
}

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'})+' '+
         d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function haversine(la1,lo1,la2,lo2) {
  const R=6371, dL=(la2-la1)*Math.PI/180, dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─────────────────────────────
//  BOOT
// ─────────────────────────────
document.getElementById('deviceSearch').addEventListener('input', (e) => {
  renderDeviceOptions(e.target.value);
});
loadDevices();
</script>
